services:
  - type: web
    name: natural-mystic-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx tsc -p tsconfig.build.json --noEmit false 2>/dev/null; npx nest build --no-type-check 2>/dev/null || npm run build
    startCommand: node dist/main.js
    plan: free
    envVars:
      - key: PORT
        value: "3000"
      - key: MONGODB_URI
        sync: false
        value: "mongodb+srv://Natural-Mystic:Tatamelcho10@cluster0.utkh1aw.mongodb.net/natural-mystic"
